version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv-scanner-backend
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PORT=3001
      - RUST_LOG=info
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - frontend
    networks:
      - cv-scanner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv-scanner-frontend
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - cv-scanner-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cv-scanner-network:
    driver: bridge

volumes:
  backend-cache:
  frontend-cache:
